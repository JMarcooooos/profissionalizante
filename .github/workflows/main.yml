name: Ajustar Modelos BRMS (Paralelo)

on:
  workflow_dispatch: # Gatilho manual

jobs:
  run-models:
    runs-on: ubuntu-latest
    
    # --- A MÁGICA DO PARALELISMO AQUI ---
    strategy:
      fail-fast: false # Se o modelo de LP der erro, o de MT continua rodando normalmente
      matrix:
        disciplina: [lp, mt] # Cria duas "linhas do tempo" simultâneas
    # ------------------------------------

    steps:
      - name: Baixar o repositório
        uses: actions/checkout@v4

      - name: Instalar o R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true 

      - name: Instalar dependências do sistema Linux
        run: sudo apt-get install -y libcurl4-openssl-dev libv8-dev

      - name: Instalar pacotes R
        run: |
          install.packages(c("brms", "dplyr"))
          install.packages("cmdstanr", repos = c("https://mc-stan.org/r-packages/", getOption("repos")))
        shell: Rscript {0}

      - name: Cache do CmdStan
        uses: actions/cache@v4
        with:
          path: ~/.cmdstan
          key: ${{ runner.os }}-cmdstan-v1

      - name: Instalar CmdStan
        run: |
          library(cmdstanr)
          # Cria o diretório vazio para o install_cmdstan não reclamar
          dir.create("~/.cmdstan", showWarnings = FALSE, recursive = TRUE)
          install_cmdstan(dir = "~/.cmdstan")
        shell: Rscript {0}

      - name: Executar o Script de Modelagem
        # O ${{ matrix.disciplina }} vai ser substituído por 'lp' numa máquina e 'mt' na outra
        run: Rscript modelagem_git_${{ matrix.disciplina }}.R

      - name: Salvar o Modelo Ajustado como Artefato
        uses: actions/upload-artifact@v4
        with:
          # O nome do zip que você vai baixar será dinâmico (ex: modelo-finalizado-lp)
          name: modelo-finalizado-${{ matrix.disciplina }}
          # Salva qualquer arquivo .rds que tenha sido gerado na pasta
          path: "*.rds" 
          retention-days: 7
